<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; form-action 'self'; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' https://www.gstatic.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.gstatic.com;">
  <title>Event Details - bibleconversations.co.uk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="site-page">
  <header class="app-bar">
    <div class="container">
      <div class="header-content">
        <a class="brand-link" href="index.html" aria-label="Bible Conversations home">
          <img class="brand-logo" src="img/logo.webp" alt="Bible Conversations logo" />
          <img class="teesside-logo header-teesside-logo" src="img/Teesside logo.svg" alt="Teesside" />
        </a>
        <button class="menu-toggle" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="primaryNav">
          <span class="material-symbols-outlined" aria-hidden="true">menu</span>
        </button>
        <nav class="top-nav" id="primaryNav" aria-label="Primary navigation">
          <a href="index.html">Events Map</a>
          <a href="faq.html">FAQ</a>
          <a href="admin.html">Admin Panel</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="container detail-main">
    <a class="back-link" href="index.html">
      <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
      Back to events
    </a>

    <section id="eventDetail" class="detail-section">
      <p class="empty-state">Loading event details...</p>
    </section>
  </main>

  <div id="successAlert" class="alert success" role="status" aria-live="polite"></div>
  <div id="errorAlert" class="alert error" role="alert"></div>
  <div id="infoAlert" class="alert info" role="status" aria-live="polite"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/site-nav.js"></script>
  <script src="js/event-detail.js"></script>
</body>
</html>
